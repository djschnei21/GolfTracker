<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8fafc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>2026 British Open Fantasy Golf Pool</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: light;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      min-height: 100dvh;
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
    }

    @keyframes pulse-live {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 1; }
    }

    .live-dot {
      animation: pulse-live 1.2s infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      .live-dot {
        animation: none;
        opacity: 1;
      }
    }

    details > summary {
      list-style: none;
    }

    details > summary::-webkit-details-marker {
      display: none;
    }

    .tabular {
      font-variant-numeric: tabular-nums;
    }

    .row-summary {
      -webkit-tap-highlight-color: transparent;
    }

    .row-summary:focus-visible,
    #refreshBtn:focus-visible,
    #infoBtn:focus-visible {
      outline: 2px solid #0f172a;
      outline-offset: 2px;
    }

    .leaderboard-grid {
      display: grid;
      grid-template-columns: 2.5rem minmax(0, 1fr) 3.75rem 1.25rem;
      align-items: center;
      column-gap: 0.5rem;
    }

    .leaderboard-grid .desktop-only {
      display: none;
    }

    @media (min-width: 640px) {
      .leaderboard-grid {
        grid-template-columns: 3.5rem minmax(0, 1.6fr) 5.5rem 5rem 4.5rem 1.5rem;
        column-gap: 1rem;
      }

      .leaderboard-grid .desktop-only {
        display: block;
      }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <main class="mx-auto w-full max-w-4xl px-3 pb-6 pt-3 sm:px-5 sm:pb-8 sm:pt-5">
    <header class="mb-3 rounded-2xl bg-white p-4 shadow-sm ring-1 ring-slate-200/80 sm:mb-4 sm:p-5">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0 flex-1">
          <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-slate-500">Fantasy Pool</p>
          <h1 class="mt-1 text-xl font-bold leading-tight tracking-tight text-slate-900 sm:text-2xl">
            <span class="sm:hidden">British Open ’26</span>
            <span class="hidden sm:inline">2026 British Open Fantasy Pool</span>
          </h1>
          <p id="eventInfo" class="mt-1 truncate text-xs text-slate-500 sm:text-sm">Loading event…</p>
        </div>
        <div class="relative flex shrink-0 items-center gap-2">
          <button
            id="infoBtn"
            type="button"
            class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-slate-300 bg-white text-sm font-semibold text-slate-600 hover:bg-slate-50"
            aria-expanded="false"
            aria-controls="infoPanel"
            title="Scoring rules"
          >
            i
          </button>
          <button
            id="refreshBtn"
            type="button"
            class="inline-flex h-10 items-center justify-center rounded-xl bg-slate-900 px-3.5 text-sm font-semibold text-white shadow-sm hover:bg-slate-800 disabled:cursor-wait disabled:opacity-70"
          >
            Refresh
          </button>
          <div
            id="infoPanel"
            class="absolute right-0 top-12 z-20 hidden w-[min(18rem,calc(100vw-2rem))] rounded-xl border border-slate-200 bg-white p-3 text-xs leading-relaxed text-slate-600 shadow-lg"
            role="dialog"
            aria-label="Scoring rules"
          >
            Top 5 of 6 golfers count toward the team score. Missed-cut or missing golfers use the weekend last-place penalty score. Tap a manager to view their roster.
          </div>
        </div>
      </div>

      <div class="mt-4 flex flex-wrap items-center gap-2">
        <div class="inline-flex items-center gap-2 rounded-full bg-emerald-50 px-2.5 py-1 text-xs font-medium text-emerald-800 ring-1 ring-emerald-100">
          <span class="live-dot inline-block h-2 w-2 rounded-full bg-emerald-500" aria-hidden="true"></span>
          <span id="liveStatus">Live · Updated at --</span>
        </div>
        <p id="penaltyInfo" class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-700 ring-1 ring-slate-200/80"></p>
      </div>

      <p id="statusBanner" class="mt-3 hidden rounded-xl border border-amber-200 bg-amber-50 px-3 py-2 text-xs leading-relaxed text-amber-900 sm:text-sm"></p>
    </header>

    <section class="rounded-2xl bg-white shadow-sm ring-1 ring-slate-200/80" aria-label="Fantasy leaderboard">
      <div class="leaderboard-grid sticky top-0 z-10 rounded-t-2xl border-b border-slate-200 bg-slate-100/95 px-3 py-2.5 text-[11px] font-semibold uppercase tracking-wide text-slate-500 backdrop-blur sm:px-4 sm:text-xs">
        <span>Pos</span>
        <span>Manager</span>
        <span class="text-right">Score</span>
        <span class="desktop-only text-right">Holes</span>
        <span class="desktop-only text-right">Active</span>
        <span aria-hidden="true"></span>
      </div>
      <div id="leaderboardBody" class="divide-y divide-slate-200"></div>
    </section>
  </main>

  <script>
    const ESPN_ENDPOINT = "https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga";
    const CACHE_KEY = "british_open_fantasy_cache_v1";
    const FETCH_TIMEOUT_MS = 15000;
    const EXPECTED_EVENT_PATTERN = /\b(the\s+open|british\s+open|open\s+championship)\b/i;

    const LEAGUE_DATA = [
      { manager: "Nick", tiebreaker: -12, picks: ["Chris Gotterup", "Russell Henley", "Patrick Reed", "Aaron Rai", "Michael Thorbjornsen", "Tom McKibbin"] },
      { manager: "Dad", tiebreaker: -22, picks: ["Jon Rahm", "Tyrrell Hatton", "Shane Lowry", "Aaron Rai", "Corey Conners", "J.T. Poston"] },
      { manager: "Mom", tiebreaker: -9, picks: ["Rory McIlroy", "Justin Rose", "Tom Kim", "Alex Fitzpatrick", "Akshay Bhatia", "Max Homa"] },
      { manager: "Hannah", tiebreaker: -9, picks: ["Tommy Fleetwood", "Justin Rose", "Hideki Matsuyama", "Aaron Rai", "Alexander Noren", "Daniel Berger"] },
      { manager: "Dan", tiebreaker: -10, picks: ["Scottie Scheffler", "Justin Rose", "Jordan Spieth", "Aaron Rai", "Cameron Smith", "Sepp Straka"] },
      { manager: "Heath", tiebreaker: -16, picks: ["Rory McIlroy", "Sam Burns", "Si Woo Kim", "Maverick McNealy", "Michael Thorbjornsen", "Eric Cole"] },
      { manager: "Lauren", tiebreaker: -12, picks: ["Rory McIlroy", "Wyndham Clark", "J.J. Spaun", "Alex Fitzpatrick", "Alexander Noren", "Matthew Jordan"] },
      { manager: "Iuliia", tiebreaker: -11, picks: ["Cameron Young", "Wyndham Clark", "Patrick Reed", "Ben Griffin", "Rickie Fowler", "Sepp Straka"] },
      { manager: "Luke", tiebreaker: -12, picks: ["Matt Fitzpatrick", "Tyrrell Hatton", "Justin Thomas", "Maverick McNealy", "Brian Harman", "J.T. Poston"] }
    ];

    const PLAYER_ALIASES = {
      "jt poston": "j t poston",
      "jj spaun": "j j spaun",
      "alexander noren": "alex noren"
    };

    const leaderboardBody = document.getElementById("leaderboardBody");
    const statusBanner = document.getElementById("statusBanner");
    const liveStatusEl = document.getElementById("liveStatus");
    const penaltyInfoEl = document.getElementById("penaltyInfo");
    const eventInfoEl = document.getElementById("eventInfo");
    const refreshBtn = document.getElementById("refreshBtn");
    const infoBtn = document.getElementById("infoBtn");
    const infoPanel = document.getElementById("infoPanel");

    let refreshController = null;
    let refreshInFlight = false;
    let refreshSeq = 0;

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeName(name) {
      return (name || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z\s]/g, " ")
        .toLowerCase()
        .replace(/\s+/g, " ")
        .trim();
    }

    function canonicalName(name) {
      const normalized = normalizeName(name);
      return PLAYER_ALIASES[normalized] || normalized;
    }

    function scoreToInt(value) {
      if (value === null || value === undefined) return null;
      const raw = String(value).trim().toUpperCase();
      if (!raw || raw === "--") return null;
      if (raw === "E" || raw === "EVEN") return 0;
      const num = Number(raw.replace(/\+/g, ""));
      if (Number.isFinite(num)) return num;
      return null;
    }

    function formatScore(score) {
      if (score === null || score === undefined || Number.isNaN(score)) return "--";
      if (score === 0) return "E";
      return score > 0 ? `+${score}` : `${score}`;
    }

    function scoreClass(score) {
      if (score === null || score === undefined || Number.isNaN(score) || score === 0) {
        return "text-slate-700";
      }
      return score < 0 ? "text-rose-600" : "text-sky-700";
    }

    function getStatusState(competitor) {
      return String(competitor?.status?.type?.state || "").toLowerCase();
    }

    function getStatusName(competitor) {
      return String(competitor?.status?.type?.name || "").toUpperCase();
    }

    function isScheduledCompetitor(competitor) {
      const state = getStatusState(competitor);
      const name = getStatusName(competitor);
      return state === "pre" || name === "STATUS_SCHEDULED";
    }

    function linescoreToPar(line) {
      return scoreToInt(line?.displayValue ?? line?.value);
    }

    function scoredLinescores(competitor) {
      const linescores = Array.isArray(competitor?.linescores) ? competitor.linescores : [];
      return linescores.filter((line) => Number.isFinite(linescoreToPar(line)));
    }

    function cutStatusFromCompetitor(competitor) {
      const statusTypeName = getStatusName(competitor);
      const statusText = `${competitor?.status?.displayValue || ""} ${competitor?.status?.detail || ""} ${competitor?.status?.type?.description || ""}`.toUpperCase();
      const isOutOfWeekendField =
        statusTypeName === "STATUS_CUT" ||
        /\bMISSED CUT\b|\bCUT\b|\bMC\b|\bWITHDRAWN\b|\bWD\b|\bDISQUALIFIED\b|\bDQ\b/.test(statusText);

      return {
        label: isOutOfWeekendField ? "Missed Cut" : "Active",
        madeCut: !isOutOfWeekendField
      };
    }

    function getRoundScoreInfo(competitor) {
      const todayDetail = competitor?.status?.todayDetail;
      if (todayDetail && typeof todayDetail === "string") {
        const match = todayDetail.match(/([+-]?\d+|E)(?:\(|$)/i);
        if (match) {
          const score = scoreToInt(match[1]);
          if (Number.isFinite(score)) {
            const period = Number(competitor?.status?.period);
            return {
              score,
              label: Number.isFinite(period) && period > 0 ? `Round ${period}` : "This round"
            };
          }
        }
      }

      const linescores = Array.isArray(competitor?.linescores) ? competitor.linescores : [];
      const period = Number(competitor?.status?.period);
      if (Number.isFinite(period)) {
        const current = linescores.find((line) => Number(line?.period) === period);
        const currentScore = linescoreToPar(current);
        if (Number.isFinite(currentScore)) {
          return { score: currentScore, label: `Round ${period}` };
        }
      }

      // Between rounds: show the last completed round instead of a blank current round.
      const scored = scoredLinescores(competitor);
      if (scored.length) {
        const last = scored[scored.length - 1];
        const roundNum = Number(last?.period) || scored.length;
        return { score: linescoreToPar(last), label: `Round ${roundNum}` };
      }

      return {
        score: null,
        label: Number.isFinite(period) && period > 0 ? `Round ${period}` : "This round"
      };
    }

    function getLiveTotalScore(competitor) {
      const statistics = Array.isArray(competitor?.statistics) ? competitor.statistics : [];
      const scoreToParStat = statistics.find((stat) => {
        const signature = `${stat?.name || ""} ${stat?.displayName || ""} ${stat?.abbreviation || ""}`.toLowerCase();
        return signature.includes("scoretopar") || signature.includes("score to par");
      });
      const statScore = scoreToInt(scoreToParStat?.displayValue ?? scoreToParStat?.value);
      if (Number.isFinite(statScore)) return statScore;

      const roundToPar = scoredLinescores(competitor)
        .map((line) => linescoreToPar(line))
        .filter((value) => Number.isFinite(value));
      if (roundToPar.length) {
        return roundToPar.reduce((sum, value) => sum + value, 0);
      }

      return scoreToInt(competitor?.score?.displayValue ?? competitor?.score?.value);
    }

    function getHolesPlayed(competitor) {
      const status = competitor?.status || {};
      const completedRoundHoles = scoredLinescores(competitor).length * 18;

      if (isScheduledCompetitor(competitor)) {
        return completedRoundHoles;
      }

      const roundFromPeriod = Number(status?.period);
      const currentRound = Number.isFinite(roundFromPeriod) && roundFromPeriod > 0
        ? roundFromPeriod
        : Math.max(1, scoredLinescores(competitor).length);
      const priorRoundHoles = Math.max(0, currentRound - 1) * 18;
      const displayValue = String(status?.displayValue || "").toUpperCase();
      const displayThru = String(status?.displayThru || "").trim().toUpperCase();

      if (status?.type?.completed || displayValue === "F" || displayThru === "F") {
        return priorRoundHoles + 18;
      }

      const thruNum = Number(status?.thru);
      if (Number.isFinite(thruNum) && thruNum > 0) {
        return priorRoundHoles + Math.min(18, thruNum);
      }

      if (Number.isFinite(Number(displayThru))) {
        return priorRoundHoles + Math.min(18, Math.max(0, Number(displayThru)));
      }

      if (getStatusState(competitor) === "in" && Number.isFinite(status?.hole)) {
        return priorRoundHoles + Math.min(18, Math.max(0, status.hole));
      }

      const cutInfo = cutStatusFromCompetitor(competitor);
      if (!cutInfo.madeCut) return completedRoundHoles || priorRoundHoles;

      return completedRoundHoles || priorRoundHoles;
    }

    function getThru(competitor) {
      const status = competitor?.status || {};
      if (isScheduledCompetitor(competitor)) {
        const teeTime = status?.detail || status?.type?.shortDetail;
        return teeTime ? `Tee off ${teeTime}` : "Not started";
      }
      if (status?.type?.completed) return "Finished";
      const displayThru = String(status?.displayThru || "").trim().toUpperCase();
      if (displayThru === "F") return "Finished";
      if (status?.displayThru) return `Playing · thru ${status.displayThru}`;
      if (Number.isFinite(status?.thru) && status.thru > 0) return `Playing · thru ${status.thru}`;
      if (getStatusState(competitor) === "in" && Number.isFinite(status?.hole)) {
        return `Playing · thru ${status.hole}`;
      }
      if (status?.displayValue && !String(status.displayValue).includes("T") && !String(status.displayValue).includes("-")) {
        return status.displayValue;
      }
      return "Status unavailable";
    }

    function deriveActualWinnerScore(competitors) {
      const sorted = [...competitors].sort((a, b) => (a.position || 999) - (b.position || 999));
      const leader = sorted[0];
      return leader?.totalScore ?? 0;
    }

    function pickWeekendPenaltyCard(competitors) {
      const madeCut = competitors.filter((c) => c.madeCut && Number.isFinite(c.totalScore));
      if (!madeCut.length) {
        return { score: 20, holes: 36 };
      }

      const worstMadeCut = madeCut.reduce((worst, next) => {
        if (next.totalScore > worst.totalScore) return next;
        if (next.totalScore === worst.totalScore) {
          const nextHoles = Number.isFinite(next.holesPlayed) ? next.holesPlayed : 0;
          const worstHoles = Number.isFinite(worst.holesPlayed) ? worst.holesPlayed : 0;
          if (nextHoles > worstHoles) return next;
        }
        return worst;
      }, madeCut[0]);

      return {
        score: worstMadeCut.totalScore,
        holes: Number.isFinite(worstMadeCut.holesPlayed) ? worstMadeCut.holesPlayed : 0
      };
    }

    function getEventMeta(apiPayload) {
      const event = apiPayload?.events?.[0];
      const name = event?.name || event?.shortName || "Unknown event";
      const status = event?.status?.type?.description || "";
      return {
        name,
        shortName: event?.shortName || name,
        status,
        isExpectedEvent: EXPECTED_EVENT_PATTERN.test(`${name} ${event?.shortName || ""}`)
      };
    }

    function buildCompetitorMap(apiPayload) {
      const event = apiPayload?.events?.[0];
      const competition = event?.competitions?.[0];
      const competitors = Array.isArray(competition?.competitors) ? competition.competitors : [];
      const map = new Map();
      const parsedCompetitors = [];

      competitors.forEach((competitor) => {
        const displayName = competitor?.athlete?.displayName || competitor?.athlete?.shortName;
        if (!displayName) return;
        const totalScore = getLiveTotalScore(competitor);
        const cutInfo = cutStatusFromCompetitor(competitor);
        const roundInfo = getRoundScoreInfo(competitor);
        const parsed = {
          name: displayName,
          canonical: canonicalName(displayName),
          totalScore,
          todayScore: roundInfo.score,
          roundLabel: roundInfo.label,
          holesPlayed: getHolesPlayed(competitor),
          thru: getThru(competitor),
          cutStatus: cutInfo.label,
          madeCut: cutInfo.madeCut,
          position: Number(competitor?.status?.position?.id || 999)
        };
        parsedCompetitors.push(parsed);
        if (!map.has(parsed.canonical)) map.set(parsed.canonical, parsed);
      });

      return { map, parsedCompetitors };
    }

    function resolvePlayer(playerName, competitorMap) {
      const canonical = canonicalName(playerName);
      if (competitorMap.has(canonical)) return competitorMap.get(canonical);

      const tokens = canonical.split(" ").filter(Boolean);
      const fallbackMatch = [...competitorMap.values()].find((entry) =>
        tokens.length > 1 && tokens.every((token) => entry.canonical.includes(token))
      );
      if (fallbackMatch) return fallbackMatch;

      return null;
    }

    function computeLeagueStandings(apiPayload) {
      const { map: competitorMap, parsedCompetitors } = buildCompetitorMap(apiPayload);
      const weekendPenaltyCard = pickWeekendPenaltyCard(parsedCompetitors);
      const weekendPenaltyScore = weekendPenaltyCard.score;
      const weekendPenaltyHoles = weekendPenaltyCard.holes;
      const actualWinnerScore = deriveActualWinnerScore(parsedCompetitors);
      const eventMeta = getEventMeta(apiPayload);
      let unmatchedCount = 0;

      const managerScores = LEAGUE_DATA.map((team) => {
        const roster = team.picks.map((player, index) => {
          const competitor = resolvePlayer(player, competitorMap);
          const found = Boolean(competitor);
          if (!found) unmatchedCount += 1;

          const totalScore = competitor?.totalScore;
          const holesPlayed = Number.isFinite(competitor?.holesPlayed) ? competitor.holesPlayed : 0;
          const madeCut = found ? Boolean(competitor.madeCut) : false;
          const replacementApplied = !found || !madeCut;
          const cutStatus = !found
            ? "Not found"
            : replacementApplied
            ? "Missed Cut (Penalty Applied)"
            : "Active";
          const effectiveScoreSource = replacementApplied ? weekendPenaltyScore : totalScore;
          const effectiveHolesSource = replacementApplied ? weekendPenaltyHoles : holesPlayed;

          return {
            name: player,
            tier: `Tier ${index + 1}`,
            todayScore: competitor?.todayScore ?? null,
            roundLabel: competitor?.roundLabel || "This round",
            holesPlayed,
            thru: found ? (competitor.thru ?? "--") : "--",
            totalScore: totalScore ?? null,
            effectiveScore: Number.isFinite(effectiveScoreSource) ? effectiveScoreSource : weekendPenaltyScore,
            effectiveHoles: Number.isFinite(effectiveHolesSource) ? effectiveHolesSource : weekendPenaltyHoles,
            cutStatus,
            madeCut,
            found,
            contributes: false,
            dropped: false
          };
        });

        const sortedForCounting = [...roster]
          .map((golfer, idx) => ({ golfer, idx }))
          .sort((a, b) => {
            if (a.golfer.effectiveScore !== b.golfer.effectiveScore) {
              return a.golfer.effectiveScore - b.golfer.effectiveScore;
            }
            return a.idx - b.idx;
          });

        sortedForCounting.forEach((item, idx) => {
          if (idx < 5) item.golfer.contributes = true;
          if (idx === 5) item.golfer.dropped = true;
        });

        const countingFiveGolfers = sortedForCounting.slice(0, 5).map((item) => item.golfer);
        const total = countingFiveGolfers.reduce((sum, golfer) => sum + golfer.effectiveScore, 0);
        const thruTotal = countingFiveGolfers.reduce((sum, golfer) => sum + golfer.effectiveHoles, 0);
        const activeCount = roster.filter((g) => g.found && g.madeCut).length;
        const tieDistance = Math.abs(team.tiebreaker - actualWinnerScore);

        return {
          manager: team.manager,
          tiebreaker: team.tiebreaker,
          tieDistance,
          total,
          thruTotal,
          activeCount,
          roster
        };
      });

      managerScores.sort((a, b) => {
        if (a.total !== b.total) return a.total - b.total;
        if (a.tieDistance !== b.tieDistance) return a.tieDistance - b.tieDistance;
        return a.manager.localeCompare(b.manager);
      });

      const scoreCounts = managerScores.reduce((counts, entry) => {
        const key = String(entry.total);
        counts[key] = (counts[key] || 0) + 1;
        return counts;
      }, {});

      managerScores.forEach((entry, i) => {
        const previous = managerScores[i - 1];
        const tiedWithPrevious = previous && previous.total === entry.total;
        entry.placeNumber = tiedWithPrevious ? previous.placeNumber : i + 1;
        entry.isTied = (scoreCounts[String(entry.total)] || 0) > 1;
        entry.positionLabel = entry.isTied ? `T${entry.placeNumber}` : `${entry.placeNumber}`;
      });

      return {
        standings: managerScores,
        weekendPenaltyScore,
        weekendPenaltyHoles,
        eventMeta,
        unmatchedCount
      };
    }

    function managerDetailMarkup(entry) {
      const rows = entry.roster.map((golfer) => {
        const contributionClass = golfer.contributes
          ? "border-emerald-200 bg-emerald-50/80"
          : golfer.dropped
          ? "border-slate-200 bg-slate-100/80"
          : "border-slate-200 bg-white";

        const contributionTag = golfer.contributes
          ? '<span class="rounded-full bg-emerald-100 px-2 py-0.5 text-[10px] font-semibold text-emerald-700">Counting</span>'
          : golfer.dropped
          ? '<span class="rounded-full bg-slate-200 px-2 py-0.5 text-[10px] font-semibold text-slate-700">Dropped</span>'
          : "";

        const cutClass = !golfer.found || golfer.cutStatus.includes("Missed Cut") || golfer.cutStatus === "Not found"
          ? "text-amber-700"
          : "text-emerald-700";

        const playStatus = !golfer.found
          ? "Not in field"
          : golfer.cutStatus.includes("Missed Cut")
          ? "Missed cut · penalty score used"
          : golfer.thru;

        const usingPenalty =
          golfer.found &&
          Number.isFinite(golfer.totalScore) &&
          golfer.effectiveScore !== golfer.totalScore;

        return `
          <article class="rounded-xl border p-3 ${contributionClass}">
            <div class="flex items-start justify-between gap-2">
              <div class="min-w-0">
                <p class="truncate font-semibold text-slate-900">${escapeHtml(golfer.name)}</p>
                <p class="mt-0.5 text-[11px] text-slate-500">${escapeHtml(golfer.tier)} · <span class="${cutClass}">${escapeHtml(golfer.cutStatus)}</span></p>
              </div>
              <div class="flex shrink-0 flex-col items-end gap-1">
                ${contributionTag}
                <p class="tabular text-base font-bold leading-none ${scoreClass(golfer.effectiveScore)}">${formatScore(golfer.effectiveScore)}</p>
                <p class="text-[10px] font-medium uppercase tracking-wide text-slate-500">Team score</p>
              </div>
            </div>
            <p class="mt-2 text-xs font-medium text-slate-700">${escapeHtml(playStatus)}</p>
            <div class="mt-2 flex flex-wrap gap-x-4 gap-y-1 text-xs">
              <p>
                <span class="text-slate-500">${escapeHtml(golfer.roundLabel)} </span>
                <span class="tabular font-semibold ${scoreClass(golfer.todayScore)}">${formatScore(golfer.todayScore)}</span>
              </p>
              <p>
                <span class="text-slate-500">Tournament </span>
                <span class="tabular font-semibold ${scoreClass(golfer.totalScore)}">${formatScore(golfer.totalScore)}</span>
              </p>
            </div>
            ${usingPenalty ? `<p class="mt-1 text-[11px] text-amber-700">Actual score ${formatScore(golfer.totalScore)}; counting ${formatScore(golfer.effectiveScore)} for the team.</p>` : ""}
          </article>
        `;
      }).join("");

      return `
        <div class="border-t border-slate-200 bg-slate-50 px-3 py-3 sm:px-4">
          <div class="mb-3 flex flex-wrap items-center justify-between gap-2 text-xs sm:text-sm">
            <p class="font-semibold text-slate-800">Roster</p>
            <p class="text-slate-600">Tiebreaker: <span class="tabular font-semibold text-slate-800">${formatScore(entry.tiebreaker)}</span></p>
          </div>
          <div class="grid gap-2 sm:grid-cols-2">${rows}</div>
        </div>
      `;
    }

    function getExpandedManagers() {
      return [...leaderboardBody.querySelectorAll("details[open]")]
        .map((el) => el.dataset.manager)
        .filter(Boolean);
    }

    function renderLeaderboard(standings, expandedManagers = []) {
      const expanded = new Set(expandedManagers);
      leaderboardBody.innerHTML = standings.map((entry) => {
        const isLeader = entry.placeNumber === 1;
        const rowTone = isLeader ? "bg-emerald-50/70" : "bg-white";
        const openAttr = expanded.has(entry.manager) ? " open" : "";
        const leaderBadge = isLeader
          ? '<span class="ml-1.5 inline-flex rounded-full bg-emerald-100 px-1.5 py-0.5 text-[10px] font-semibold text-emerald-700">1st</span>'
          : "";

        return `
          <details class="group ${rowTone}" data-manager="${escapeHtml(entry.manager)}"${openAttr}>
            <summary class="row-summary cursor-pointer px-3 py-3 transition-colors hover:bg-slate-50 group-open:bg-slate-50/80 sm:px-4 sm:py-3.5">
              <div class="leaderboard-grid text-sm">
                <span class="tabular text-sm font-bold ${isLeader ? "text-emerald-700" : "text-slate-600"}">${escapeHtml(entry.positionLabel)}</span>
                <span class="min-w-0">
                  <span class="block truncate font-semibold text-slate-900">
                    ${escapeHtml(entry.manager)}${leaderBadge}
                  </span>
                  <span class="mt-0.5 block text-xs text-slate-500 sm:hidden">
                    ${entry.thruTotal} holes · ${entry.activeCount}/6 active
                  </span>
                </span>
                <span class="tabular text-right text-base font-bold ${scoreClass(entry.total)}">${formatScore(entry.total)}</span>
                <span class="desktop-only tabular text-right font-semibold text-slate-700">${entry.thruTotal}</span>
                <span class="desktop-only text-right text-slate-600">${entry.activeCount}/6</span>
                <span class="text-right text-lg leading-none text-slate-400 transition-transform duration-200 group-open:rotate-90" aria-hidden="true">›</span>
              </div>
            </summary>
            ${managerDetailMarkup(entry)}
          </details>
        `;
      }).join("");
    }

    function setStatus(message, type = "warning") {
      if (!message) {
        statusBanner.classList.add("hidden");
        statusBanner.textContent = "";
        return;
      }
      statusBanner.classList.remove("hidden");
      statusBanner.textContent = message;
      statusBanner.className =
        type === "error"
          ? "mt-3 rounded-xl border border-rose-200 bg-rose-50 px-3 py-2 text-xs leading-relaxed text-rose-900 sm:text-sm"
          : "mt-3 rounded-xl border border-amber-200 bg-amber-50 px-3 py-2 text-xs leading-relaxed text-amber-900 sm:text-sm";
    }

    function setInfoOpen(open) {
      infoPanel.classList.toggle("hidden", !open);
      infoBtn.setAttribute("aria-expanded", open ? "true" : "false");
    }

    function getCachedPayload() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return parsed?.payload || null;
      } catch (_err) {
        return null;
      }
    }

    function cachePayload(payload) {
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({ payload, cachedAt: new Date().toISOString() }));
      } catch (_err) {
        // No-op when storage is unavailable.
      }
    }

    async function fetchLiveData(signal) {
      const response = await fetch(ESPN_ENDPOINT, { cache: "no-store", signal });
      if (!response.ok) throw new Error(`API returned ${response.status}`);
      return response.json();
    }

    async function refreshData({ force = false } = {}) {
      if (refreshInFlight && !force) return;

      if (refreshController) refreshController.abort();
      const controller = new AbortController();
      refreshController = controller;
      const seq = ++refreshSeq;
      const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);

      refreshInFlight = true;
      refreshBtn.disabled = true;
      refreshBtn.textContent = "Refreshing...";
      liveStatusEl.textContent = "Live · Syncing...";

      const expandedManagers = getExpandedManagers();
      let payload;
      let usingCache = false;
      const warnings = [];

      try {
        payload = await fetchLiveData(controller.signal);
        if (seq !== refreshSeq) return;
        cachePayload(payload);
      } catch (err) {
        if (seq !== refreshSeq) return;
        payload = getCachedPayload();
        usingCache = Boolean(payload);
        if (!payload) {
          payload = { events: [{ competitions: [{ competitors: [] }] }] };
          warnings.push("Live data unavailable right now. Showing placeholders until API returns.");
        } else {
          warnings.push(
            err?.name === "AbortError"
              ? "Request timed out. Showing last cached snapshot."
              : "Live API unavailable. Showing last cached snapshot."
          );
        }
      } finally {
        clearTimeout(timeoutId);
      }

      if (seq !== refreshSeq) return;

      const {
        standings,
        weekendPenaltyScore,
        weekendPenaltyHoles,
        eventMeta,
        unmatchedCount
      } = computeLeagueStandings(payload);

      eventInfoEl.textContent = eventMeta.status
        ? `${eventMeta.name} · ${eventMeta.status}`
        : eventMeta.name;

      if (!eventMeta.isExpectedEvent && eventMeta.name !== "Unknown event") {
        warnings.push(`Unexpected event feed: "${eventMeta.name}". Scores may not be for The Open.`);
      }
      if (unmatchedCount > 0) {
        warnings.push(`${unmatchedCount} pick${unmatchedCount === 1 ? "" : "s"} not found in the field (penalty applied).`);
      }

      const hasError = warnings.some((msg) => msg.includes("unavailable right now"));
      setStatus(warnings.join(" "), hasError ? "error" : warnings.length ? "warning" : "");

      renderLeaderboard(standings, expandedManagers);

      const nowText = new Date().toLocaleString([], { hour: "numeric", minute: "2-digit" });
      liveStatusEl.textContent = `${usingCache ? "Live (cached)" : "Live"} · Updated at ${nowText}`;
      penaltyInfoEl.textContent = `Penalty ${formatScore(weekendPenaltyScore)} · ${weekendPenaltyHoles}h`;

      refreshBtn.disabled = false;
      refreshBtn.textContent = "Refresh";
      refreshInFlight = false;
    }

    infoBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      setInfoOpen(infoPanel.classList.contains("hidden"));
    });

    document.addEventListener("click", (event) => {
      if (!infoPanel.classList.contains("hidden") && !infoPanel.contains(event.target) && event.target !== infoBtn) {
        setInfoOpen(false);
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") setInfoOpen(false);
    });

    refreshBtn.addEventListener("click", () => {
      refreshData({ force: true });
    });
    refreshData({ force: true });
    setInterval(() => {
      refreshData();
    }, 60000);
  </script>
</body>
</html>
